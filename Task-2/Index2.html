<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intermediate HTML CSS JS Task</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav class="navbar">
        <h1>ApexPlanet Task 2</h1>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <!-- Contact Form -->
    <section class="container">
        <div class="form-box">
            <h2>Contact Form</h2>

            <form id="contactForm">
                <input type="text" id="name" placeholder="Enter Your Name">
                <input type="email" id="email" placeholder="Enter Your Email">
                <textarea id="message" placeholder="Enter Message"></textarea>

                <button type="submit">Submit</button>
            </form>

            <p id="error"></p>
        </div>

        <!-- To Do List -->
        <div class="todo-box">
            <h2>Dynamic To-Do List</h2>

            <div class="todo-input">
                <input type="text" id="taskInput" placeholder="Add a task">
                <button onclick="addTask()">Add</button>
            </div>

            <ul id="taskList"></ul>
        </div>
    </section>

    <!-- Responsive Grid -->
    <section class="grid-section">
        <h2>Responsive Layout Using CSS Grid</h2>

        <div class="grid-container">
            <div class="grid-item">Box 1</div>
            <div class="grid-item">Box 2</div>
            <div class="grid-item">Box 3</div>
            <div class="grid-item">Box 4</div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
